kind = "web"
previewPath = "/"
title = "FixYa"
version = "1.0.0"
id = "artifacts/fixya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22561

[services.development]
run = "pnpm --filter @workspace/fixya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fixya", "run", "build" ]
publicDir = "artifacts/fixya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22561"
BASE_PATH = "/"
